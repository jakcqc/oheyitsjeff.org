<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Bacteria</title>
  <meta name="color-scheme" content="light dark">
  <meta name="viewport"
        content="viewport-fit=cover,width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

  <link rel="icon" type="image/png" href="/assets/icon/jAsset.png"/>
  <link href="../helper/uiHelper.css" rel="stylesheet">

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Alata&amp;family=Courier+Prime:wght@700&amp;family=Kosugi+Maru&amp;family=Kumbh+Sans&amp;family=Scheherazade:wght@700&amp;display=swap" rel="stylesheet">

  <script type="module" src="./bacteriaVisualizer.js"></script>
</head>

<body>
  <div id="infoBar">
    <button id="button-exit" onclick="goTo('../')">X</button>
    <button id="button-info">INFO</button>
    <button id="button-toggle">&lt;&gt;</button>
    Interference
  </div>

  <div id="preset-bar">
    <span>Load presets:</span>
    <button id="preset-default" class="btn-inline">Default</button>
    <button id="preset-cluster" class="btn-inline">Cluster Color</button>
    <button id="preset-gradiant" class="btn-inline">Gradiant</button>
    <button id="preset-shimmer" class="btn-inline">Shimmer</button>
  </div>

  <div id="config"></div>

  <div id="background">
    <div id="outer">
      <div id="vis"></div>
    </div>
  </div>
</body>
<script>
  document.getElementById("button-info").onclick = () => {
    const el = document.getElementById("config");
    el.style.display = (el.style.display === "none") ? "block" : "none";
  };
  const toggleBtn = document.getElementById("button-toggle");
  const presetBar = document.getElementById("preset-bar");
  if (toggleBtn && presetBar) {
    toggleBtn.onclick = () => {
      const isShown = presetBar.classList.toggle("show");
      presetBar.style.display = isShown ? "flex" : "none";
      toggleBtn.setAttribute("aria-pressed", String(isShown));
    };
  }
</script>
</html>
