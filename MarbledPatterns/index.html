<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Marbled Patterns</title>
  <meta name="color-scheme" content="light dark">
  <meta name="viewport"
        content="viewport-fit=cover,width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

  <link rel="icon" type="image/png" href="/assets/icon/jAsset.png"/>

  <link href="../helper/uiHelper.css" rel="stylesheet">

  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; height: 100vh; }
    #background { flex: 1; min-height: 0; }
    #outer, #vis { width: 100%; height: 100%; }
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Work+Sans:wght@500;700&display=swap" rel="stylesheet">

  <script type="module" src="index.js"></script>
</head>

<body>
  <div id="infoBar">
    <button id="button-exit" onclick="goTo('../MathVisuals/')">X</button>
    <button id="button-info">INFO</button>
    <button id="button-toggle">&lt;&gt;</button>
    Marbled Patterns
  </div>

  <div id="preset-bar">
    <span>Load presets:</span>
    <button id="preset-1" class="btn-inline">1</button>
    <button id="preset-2" class="btn-inline">2</button>
    <button id="preset-3" class="btn-inline">3</button>
  </div>

  <div id="config"></div>

  <div id="background">
    <div id="outer">
      <div id="vis"></div>
    </div>
  </div>
</body>
<script>
  document.getElementById("button-info").onclick = () => {
    const el = document.getElementById("config");
    el.style.display = (el.style.display === "none") ? "block" : "none";
  };
  const toggleBtn = document.getElementById("button-toggle");
  const presetBar = document.getElementById("preset-bar");
  if (toggleBtn && presetBar) {
    toggleBtn.onclick = () => {
      const isShown = presetBar.classList.toggle("show");
      presetBar.style.display = isShown ? "flex" : "none";
      toggleBtn.setAttribute("aria-pressed", String(isShown));
    };
  }
</script>
</html>
